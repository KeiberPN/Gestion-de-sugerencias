<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de sugerencias</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    /* ========== ANIMACIONES ========== */
    .card-hover { 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    }
    .card-hover:hover { 
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(239, 68, 68, 0.15);
    }
    
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .slide-in-left { animation: slideInLeft 0.5s ease-out; }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .pulse-dot { 
      animation: pulse 2s infinite; 
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.1); }
    }
    
    .sidebar-item { 
      transition: all 0.2s ease;
      position: relative;
    }
    .sidebar-item:hover { 
      padding-left: 1.5rem;
      background: rgba(30, 41, 59, 0.5);
    }
    
    /* Modo claro - sidebar item */
    body.light-theme .sidebar-item:hover {
      background: rgba(226, 232, 240, 0.5);
    }
    
    .toast { animation: slideIn 0.3s ease-out; }
    @keyframes slideIn {
      from { transform: translateX(400px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    /* ========== BARRA DE DESPLAZAMIENTO PERSONALIZADA ========== */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.5);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.7);
    }
    
    /* ========== ANIMACIONES DE BADGES ========== */
    .badge-pulse {
      animation: badgePulse 2s infinite;
    }
    @keyframes badgePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    /* ========== EFECTOS DE ÍCONOS Y BOTONES ========== */
    .icon-btn {
      transition: all 0.3s ease;
    }
    .icon-btn:hover {
      transform: scale(1.1);
    }
    
    /* ========== MODAL Y BACKDROP ========== */
    .modal-backdrop {
      animation: backdropFade 0.3s ease-out;
    }
    @keyframes backdropFade {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    /* ========== BARRAS DE PROGRESO ========== */
    .progress-fill {
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* ========== TARJETAS DE ESTADÍSTICAS ========== */
    .stat-card {
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    }
    
    /* Modo claro - borde de tarjeta */
    body.light-theme .stat-card::before {
      background: linear-gradient(90deg, transparent, rgba(15, 23, 42, 0.05), transparent);
    }
    
    /* ========== ENTRADAS DE FORMULARIOS ========== */
    input, textarea, select {
      transition: all 0.3s ease;
    }
    input:focus, textarea:focus, select:focus {
      transform: translateY(-1px);
      box-shadow: 0 10px 25px rgba(239, 68, 68, 0.1);
    }
    
    /* ========== SELECCIÓN DE TEXTO ========== */
    ::selection {
      background: rgba(239, 68, 68, 0.3);
      color: inherit;
    }

    /* ========== TEMA CLARO ========== */
    body.light-theme {
      background-color: #f8fafc;
      color: #0f172a;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  
 </head>
 <body class="h-full bg-slate-900 text-slate-100 overflow-auto">
  <!-- ========== PANTALLA DE LOGIN ========== --> 
  <!-- Esta es la primera pantalla que ve el usuario, aquí inicia sesión -->
  <div id="login-screen" class="h-full w-full flex items-center justify-center p-4">
   <div class="w-full max-w-md"><!-- Logo y Título -->
    <div class="text-center mb-8">
     <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-red-500 to-pink-600 flex items-center justify-center">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
      </svg>
     </div>
     <h1 class="text-3xl font-bold text-white mb-2">Sistema de Sugerencias</h1>
     <p class="text-slate-400">Inicia sesión en tu cuenta</p>
    </div><!-- Formulario de Login -->
    <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-2xl p-8 space-y-6"><!-- Selector de Rol (Admin/Representante) -->
     <div class="flex gap-3 mb-6">
      <button id="btn-rol-admin" class="flex-1 py-3 rounded-xl font-semibold transition-all bg-red-500 text-white">
       <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" />
       </svg> Administrador </button> 

       <button id="btn-rol-rep" class="flex-1 py-3 rounded-xl font-semibold transition-all bg-slate-700/50 text-slate-300 hover:bg-slate-700">
       <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 12H9m6 0a6 6 0 11-12 0 6 6 0 0112 0z" />
       </svg> Representante </button>
     </div><!-- Sección de Login para Administrador -->
     <div id="login-admin-section" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Usuario</label> 
        <input type="email" id="login-admin-email" placeholder="admin@ejemplo.com" class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-red-500/50 transition-all">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label> 
        <input type="password" id="login-admin-password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-red-500/50 transition-all">
      </div>
      <button id="btnLogin" class="w-full py-3 bg-gradient-to-r from-red-500 to-pink-500 hover:from-red-600 hover:to-pink-600 text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2">
       <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
       </svg> Iniciar Sesión </button>
      <p class="text-xs text-slate-500 text-center mt-4">Demo: admin / 123</p>
     </div><!-- Sección de Login para Representante -->
     <div id="login-representante-section" class="hidden space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Usuario</label> 
        <input type="text" id="login-rep-usuario" placeholder="tu.usuario" class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label> 
        <input type="password" id="login-rep-password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600/50 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all">
      </div>
      <button id="btnRep" class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold rounded-xl transition-all flex items-center justify-center gap-2">
       <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
       </svg> Iniciar Sesión </button>
      <p class="text-xs text-slate-500 text-center mt-4">Contacta a tu administrador si no tienes usuario</p>
     </div>
    </div><!-- Footer -->
    <div class="text-center mt-8 text-slate-500 text-sm">
     <p>© 2024 Sistema de Sugerencias. Todos los derechos reservados.</p>
    </div>
   </div>
  </div>
  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries
    // 2. Importa las funciones de la base de datos desde 'firebase-database.js'
    import { getDatabase, ref, onValue, set, push, update, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBg0PURRFcofrQoEM3nufp0P_Lmge3vlUk",
      authDomain: "proyecto-miguel-fd1d3.firebaseapp.com",
      databaseURL: "https://proyecto-miguel-fd1d3-default-rtdb.firebaseio.com",
      projectId: "proyecto-miguel-fd1d3",
      storageBucket: "proyecto-miguel-fd1d3.firebasestorage.app",
      messagingSenderId: "792777770172",
      appId: "1:792777770172:web:ff1a250061c86dc9f2bcb9"
    };

    // Initialize Firebase
    try {
      const app = initializeApp(firebaseConfig);
      const database = getDatabase(app);

      window.firebase = { database, ref, onValue, set, push, update, remove };

    } catch (error) {
      console.error("Error al inicializar Firebase:", error);
    }

    // ========== VARIABLES GLOBALES ==========
    // Arrays para almacenar datos de sugerencias y representantes
    let temaActual = 'dark';
    
    // Información del administrador actual
    let adminActual = { nombre: 'Administrador', iniciales: 'AD', contraseña: 'admin123' };
    
    // ========== INFORMACIÓN DEL USUARIO AUTENTICADO ==========
    // Esta variable almacena los datos del usuario que ha iniciado sesión
    let usuarioAutenticado = null;
    let rolAutenticado = null;


    
    
    // ========== NOTIFICACIONES (TOASTS) ==========
    // Muestra una notificación temporal en la esquina inferior derecha
    function mostrarNotificacion(mensaje, tipo = 'info') {
      const contenedor = document.getElementById('toast-container');
      // Colores según el tipo de notificación
      const colores = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
      // Iconos según el tipo
      const iconos = { success: '✓', error: '✕', info: 'ℹ' };

      const notificacion = document.createElement('div');
      notificacion.className = `toast flex items-center gap-3 px-4 py-3 ${colores[tipo]} text-white rounded-xl shadow-lg`;
      notificacion.innerHTML = `
        <span class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold">${iconos[tipo]}</span>
        <span class="font-medium">${mensaje}</span>
      `;

      contenedor.appendChild(notificacion);
      // Desaparecer después de 3 segundos
      setTimeout(() => {
        notificacion.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => notificacion.remove(), 300);
      }, 3000);
    }

    // ========== FUNCIONES DE AUTENTICACIÓN ==========

    document.getElementById("btn-rol-admin").addEventListener("click", () => cambiarRolLogin("admin"));
    document.getElementById("btn-rol-rep").addEventListener("click", () => cambiarRolLogin("representante"));
    // Cambiar rol en la pantalla de login (Admin o Representante)
    function cambiarRolLogin(rol) {
      const btnAdmin = document.getElementById('btn-rol-admin');
      const btnRep = document.getElementById('btn-rol-rep');
      const seccionAdmin = document.getElementById('login-admin-section');
      const seccionRep = document.getElementById('login-representante-section');

      if (rol === 'admin') {
        // Mostrar formulario de administrador
        btnAdmin.classList.add('bg-red-500');
        btnAdmin.classList.remove('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        btnAdmin.classList.add('text-white');
        
        btnRep.classList.remove('bg-red-500', 'text-white', 'bg-purple-500');
        btnRep.classList.add('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        
        seccionAdmin.classList.remove('hidden');
        seccionRep.classList.add('hidden');
      } else {
        // Mostrar formulario de representante
        btnRep.classList.add('bg-purple-500');
        btnRep.classList.remove('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        btnRep.classList.add('text-white');
        
        btnAdmin.classList.remove('bg-purple-500', 'bg-red-500', 'text-white');
        btnAdmin.classList.add('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        
        seccionRep.classList.remove('hidden');
        seccionAdmin.classList.add('hidden');
      }
    }

    // ========== LOGIN DEL ADMINISTRADOR ==========
    // Valida las credenciales del administrador contra Firebase
    document.getElementById("btnLogin").addEventListener("click", loginAdministrador);
    function loginAdministrador() {
      const email = document.getElementById('login-admin-email').value.trim();
      const password = document.getElementById('login-admin-password').value.trim();

      if (!email || !password) {
        mostrarToastLogin('Por favor completa todos los campos', 'error');
        return;
      }

      const db = window.firebase.database;
      const adminRef = window.firebase.ref(db, 'administradores');

      window.firebase.onValue(adminRef, (snapshot) => {
        let encontrado = false;

        snapshot.forEach((childSnapshot) => {
          const admin = childSnapshot.val();

          if (admin.email === email && admin.contrasena === password) {
            encontrado = true;

            const datosUsuario = {
              usuario: {
                id: childSnapshot.key,
                nombre: admin.nombre,
                email: admin.email,
                contrasena: admin.contrasena,
                iniciales: admin.nombre.substring(0, 2).toUpperCase()
              },
              rol: admin.rol // "administrador" o "director"
            };

            localStorage.setItem('usuarioAutenticado', JSON.stringify(datosUsuario));

            mostrarToastLogin(`¡Bienvenido, ${admin.nombre}!`, 'success');

            setTimeout(mostrarPanelPrincipal, 200);
          }
        });

        if (!encontrado) {
          mostrarToastLogin('Credenciales inválidas', 'error');
        }

      }, {
        onlyOnce: true // 🔥 importante para que no escuche cambios en tiempo real
      });
    }

    function mostrarPanelPrincipal() {
      window.location.href = 'html/panel_admin.html';
    }

    // ========== LOGIN DEL REPRESENTANTE ==========
    document.getElementById("btnRep").addEventListener("click", loginRepresentante);
    // Valida las credenciales del representante contra la lista de Firebase
    function loginRepresentante() {
      const usuario = document.getElementById('login-rep-usuario').value.trim();
      const password = document.getElementById('login-rep-password').value.trim();

      // Validaciones
      if (!usuario || !password) {
        mostrarToastLogin('Por favor completa todos los campos', 'error');
        return;
      }

      if (usuario.length < 3) {
        mostrarToastLogin('El usuario debe tener al menos 3 caracteres', 'error');
        return;
      }

      const db = window.firebase.database;
      const refRep = window.firebase.ref(db, 'representantes');

      onValue(refRep, (snapshot) => {
        let encontrado = false;

        snapshot.forEach((childSnapshot) => {
          const rep = childSnapshot.val();

          // ⚠️ aquí puedes usar email o usuario según tu estructura
          if (rep.email === usuario && rep.contrasena === password) {
            encontrado = true;

            const datosUsuario = {
              usuario: {
                id: childSnapshot.key,
                nombre: rep.nombre,
                email: rep.email,
                iniciales: rep.nombre.substring(0, 2).toUpperCase()
              },
              rol: 'representante'
            };

            localStorage.setItem('usuarioAutenticado', JSON.stringify(datosUsuario));

            mostrarToastLogin(`¡Bienvenido, ${rep.nombre}!`, 'success');

            setTimeout(() => {
              window.location.href = 'html/panel_usuario.html';
            }, 200);
          }
        });

        if (!encontrado) {
          mostrarToastLogin('Credenciales inválidas', 'error');
        }

      }, { onlyOnce: true });
    };


    // ========== TOAST PARA PANTALLA DE LOGIN ==========
    // Notificaciones especiales para la pantalla de login
    function mostrarToastLogin(mensaje, tipo = 'info') {
      const loginScreen = document.getElementById('login-screen');
      const colores = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
      const iconos = { success: '✓', error: '✕', info: 'ℹ' };

      const toast = document.createElement('div');
      toast.className = `fixed bottom-4 right-4 flex items-center gap-3 px-4 py-3 ${colores[tipo]} text-white rounded-xl shadow-lg animate-slide-in z-50`;
      toast.innerHTML = `
        <span class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold">${iconos[tipo]}</span>
        <span class="font-medium">${mensaje}</span>
      `;

      loginScreen.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    

    // ========== CERRAR MODALES AL PRESIONAR ESC ==========
    // Permite cerrar cualquier modal presionando la tecla ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('account-modal').classList.add('hidden');
        document.getElementById('logout-modal').classList.add('hidden');
        document.getElementById('create-representative-modal').classList.add('hidden');
        document.getElementById('response-modal').classList.add('hidden');
        document.getElementById('edit-representative-modal').classList.add('hidden');
      }
    });

    
  </script>
