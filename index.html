<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E.T.P. "NUESTRA SEÑORA DEL CARMEN" | Sugerencias</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, border-color 0.3s; }
    
    /* ========== PERSONALIZACIÓN INSTITUCIONAL ========== */
    :root {
      --primary-color: #ef4444; /* Rojo institucional */
      --secondary-color: #1e293b; /* Azul oscuro */
    }

    /* Fondo animado para el login */
    #login-screen {
      background: radial-gradient(circle at top right, rgba(239, 68, 68, 0.05), transparent),
                  radial-gradient(circle at bottom left, rgba(30, 41, 59, 0.05), transparent);
    }

    /* Estilos de inputs enfocados */
    input:focus {
      transform: scale(1.01);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15) !important;
    }

    /* ========== TEMA CLARO ========== */
    body.light-theme {
      background-color: #f1f5f9;
      color: #17202E !important;
    }

    body.light-theme #me-text {
      color: #17202E !important;
    }

    body.light-theme #login-screen {
      background-color: #f8fafc;
    }
    body.light-theme .bg-slate-800\/50 {
      background-color: rgba(255, 255, 255, 0.8);
      border-color: rgba(226, 232, 240, 1);
      backdrop-blur: 20px;
    }
    body.light-theme h1 { color: #0f172a; }
    body.light-theme label { color: #475569; }
    body.light-theme input {
      background-color: #ffffff;
      border-color: #cbd5e1;
      color: #0f172a;
    }
    body.light-theme input::placeholder { color: #94a3b8; }
    body.light-theme #btn-rol-rep {  color: #D4DFEF; }
    body.light-theme #btn-rol-rep:hover { color: #3B4758; background-color: #cbd5e1; }

    /* ========== ANIMACIONES ========== */
    .fade-in { animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      box-shadow: 0 10px 30px -10px rgba(239, 68, 68, 0.5);
    }
  </style>
</head>

<body class="h-full bg-slate-950 text-slate-100 overflow-auto overflow-x-hidden">

  <!-- Botón Flotante para cambiar Tema (Solo para visualización) -->
  <button onclick="document.body.classList.toggle('light-theme')" class="fixed top-4 right-4 p-3 rounded-full bg-slate-800 border border-slate-700 text-yellow-400 hover:scale-110 transition-all z-50">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
  </button>

  <div id="login-screen" class="min-h-screen w-full flex items-center justify-center p-4">
    <div class="w-full max-w-md fade-in">
      
      <!-- Logo Institucional -->
      <div class="text-center mb-8">
        <div class="logo-container w-24 h-24 mx-auto mb-6 rounded-3xl bg-white p-1 flex items-center justify-center overflow-hidden border-2 border-red-500">
          <!-- Coloca el Logo de tu institución aquí -->
          <img src="img/logo.jpg" alt="Logo ETP" class="w-full h-full object-contain">
        </div>
        <h1 class="text-2xl md:text-3xl font-extrabold text-white mb-1 tracking-tight">E.T.P. ARQ.</h1>
        <h2 class="text-lg font-semibold text-red-500 mb-4 uppercase tracking-widest">"Ntra. Sra. del Carmen"</h2>
        <p class="text-slate-400 font-medium" id="me-text">Buzón de Sugerencias Digital</p>
      </div>

      <!-- Formulario de Login -->
      <div class="bg-slate-800/50 backdrop-blur-2xl border border-slate-700/50 rounded-3xl p-6 md:p-8 space-y-6 shadow-2xl">
        
        <!-- Selector de Rol -->
        <div class="flex gap-2 p-1 bg-slate-900/50 rounded-2xl border border-slate-700/30">
          <button id="btn-rol-admin" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all bg-red-500 text-white shadow-lg shadow-red-500/20">
            ADMIN
          </button> 

          <button id="btn-rol-rep" class="flex-1 py-3 rounded-xl font-bold text-sm transition-all text-slate-400 hover:text-slate-200" id="me-text">
            REPRESENTANTE
          </button>
        </div>

        <!-- Login Administrador -->
        <div id="login-admin-section" class="space-y-5">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1" id="me-text">Usuario Administrativo</label> 
            <input type="user" id="login-admin-user" placeholder="ejemplo@etp.com" class="w-full px-4 py-4 bg-slate-900/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-600 focus:outline-none transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1" id="me-text">Contraseña</label> 
            <input type="password" id="login-admin-password" placeholder="••••••••" class="w-full px-4 py-4 bg-slate-900/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-600 focus:outline-none transition-all">
          </div>
          <button id="btnLogin" class="w-full py-4 bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-pink-500 text-white font-bold rounded-2xl transition-all shadow-xl shadow-red-600/20 flex items-center justify-center gap-3">
            ACCEDER AL SISTEMA
          </button>
          <p class="text-[10px] text-slate-600 text-center uppercase tracking-tighter">Acceso restringido a personal autorizado</p>
        </div>

        <!-- Login Representante -->
        <div id="login-representante-section" class="hidden space-y-5">
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1" id="me-text">Cédula / Usuario</label> 
            <input type="text" id="login-rep-usuario" placeholder="V-12345678" class="w-full px-4 py-4 bg-slate-900/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-600 focus:outline-none transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1" id="me-text">Código de Acceso</label> 
            <input type="password" id="login-rep-password" placeholder="••••••••" class="w-full px-4 py-4 bg-slate-900/50 border border-slate-700/50 rounded-2xl text-white placeholder-slate-600 focus:outline-none transition-all">
          </div>
          <button id="btnRep" class="w-full py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold rounded-2xl transition-all shadow-xl shadow-blue-600/20 flex items-center justify-center gap-3">
            ENTRAR COMO REPRESENTANTE
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="text-center mt-8 space-y-2">
        <p class="text-slate-500 text-xs font-semibold uppercase tracking-widest">© 2026 E.T.P. ARQ. NUESTRA SEÑORA DEL CARMEN</p>
        <div class="flex justify-center gap-4">
            <span class="h-1 w-8 bg-red-500 rounded-full"></span>
            <span class="h-1 w-8 bg-slate-700 rounded-full"></span>
        </div>
      </div>
    </div>
  </div>


  <script type="module">
    // Import the functions you need from the SDKs you need
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    // TODO: Add SDKs for Firebase products that you want to use
    // https://firebase.google.com/docs/web/setup#available-libraries
    // 2. Importa las funciones de la base de datos desde 'firebase-database.js'
    import { getDatabase, ref, onValue, set, push, update, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBg0PURRFcofrQoEM3nufp0P_Lmge3vlUk",
      authDomain: "proyecto-miguel-fd1d3.firebaseapp.com",
      databaseURL: "https://proyecto-miguel-fd1d3-default-rtdb.firebaseio.com",
      projectId: "proyecto-miguel-fd1d3",
      storageBucket: "proyecto-miguel-fd1d3.firebasestorage.app",
      messagingSenderId: "792777770172",
      appId: "1:792777770172:web:ff1a250061c86dc9f2bcb9"
    };

    // Initialize Firebase
    try {
      const app = initializeApp(firebaseConfig);
      const database = getDatabase(app);

      window.firebase = { database, ref, onValue, set, push, update, remove };

    } catch (error) {
      console.error("Error al inicializar Firebase:", error);
    }

    // ========== VARIABLES GLOBALES ==========
    // Arrays para almacenar datos de sugerencias y representantes
    let temaActual = 'dark';
    
    // Información del administrador actual
    let adminActual = { nombre: 'Administrador', iniciales: 'AD', contraseña: 'admin123' };
    
    // ========== INFORMACIÓN DEL USUARIO AUTENTICADO ==========
    // Esta variable almacena los datos del usuario que ha iniciado sesión
    let usuarioAutenticado = null;
    let rolAutenticado = null;


    
    
    // ========== NOTIFICACIONES (TOASTS) ==========
    // Muestra una notificación temporal en la esquina inferior derecha
    function mostrarNotificacion(mensaje, tipo = 'info') {
      const contenedor = document.getElementById('toast-container');
      // Colores según el tipo de notificación
      const colores = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
      // Iconos según el tipo
      const iconos = { success: '✓', error: '✕', info: 'ℹ' };

      const notificacion = document.createElement('div');
      notificacion.className = `toast flex items-center gap-3 px-4 py-3 ${colores[tipo]} text-white rounded-xl shadow-lg`;
      notificacion.innerHTML = `
        <span class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold">${iconos[tipo]}</span>
        <span class="font-medium">${mensaje}</span>
      `;

      contenedor.appendChild(notificacion);
      // Desaparecer después de 3 segundos
      setTimeout(() => {
        notificacion.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => notificacion.remove(), 300);
      }, 3000);
    }

    // ========== FUNCIONES DE AUTENTICACIÓN ==========

    document.getElementById("btn-rol-admin").addEventListener("click", () => cambiarRolLogin("admin"));
    document.getElementById("btn-rol-rep").addEventListener("click", () => cambiarRolLogin("representante"));
    // Cambiar rol en la pantalla de login (Admin o Representante)
    function cambiarRolLogin(rol) {
      const btnAdmin = document.getElementById('btn-rol-admin');
      const btnRep = document.getElementById('btn-rol-rep');
      const seccionAdmin = document.getElementById('login-admin-section');
      const seccionRep = document.getElementById('login-representante-section');

      if (rol === 'admin') {
        // Mostrar formulario de administrador
        btnAdmin.classList.add('bg-red-500');
        btnAdmin.classList.remove('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        btnAdmin.classList.add('text-white');
        
        btnRep.classList.remove('bg-red-500', 'text-white', 'bg-purple-500');
        btnRep.classList.add('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        
        seccionAdmin.classList.remove('hidden');
        seccionRep.classList.add('hidden');
      } else {
        // Mostrar formulario de representante
        btnRep.classList.add('bg-purple-500');
        btnRep.classList.remove('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        btnRep.classList.add('text-white');
        
        btnAdmin.classList.remove('bg-purple-500', 'bg-red-500', 'text-white');
        btnAdmin.classList.add('bg-slate-700/50', 'text-slate-300', 'hover:bg-slate-700');
        
        seccionRep.classList.remove('hidden');
        seccionAdmin.classList.add('hidden');
      }
    }

    // ========== LOGIN DEL ADMINISTRADOR ==========
    // Valida las credenciales del administrador contra Firebase
    document.getElementById("btnLogin").addEventListener("click", loginAdministrador);
    function loginAdministrador() {
      const user = document.getElementById('login-admin-user').value.trim();
      const password = document.getElementById('login-admin-password').value.trim();

      if (!user || !password) {
        mostrarToastLogin('Por favor completa todos los campos', 'error');
        return;
      }

      const db = window.firebase.database;
      const adminRef = window.firebase.ref(db, 'administradores');

      window.firebase.onValue(adminRef, (snapshot) => {
        let encontrado = false;

        snapshot.forEach((childSnapshot) => {
          const admin = childSnapshot.val();

          if (admin.user === user && admin.contrasena === password) {
            encontrado = true;

            const datosUsuario = {
              usuario: {
                id: childSnapshot.key,
                nombre: admin.nombre,
                user: admin.user,
                rol: admin.rol,
                contrasena: admin.contrasena,
                iniciales: admin.nombre.substring(0, 2).toUpperCase()
              },
              rol: admin.rol // "administrador" o "director"
            };

            localStorage.setItem('usuarioAutenticado', JSON.stringify(datosUsuario));

            mostrarToastLogin(`¡Bienvenido, ${admin.nombre}!`, 'success');

            setTimeout(mostrarPanelPrincipal, 200);
          }
        });

        if (!encontrado) {
          mostrarToastLogin('Credenciales inválidas', 'error');
        }

      }, {
        onlyOnce: true // 🔥 importante para que no escuche cambios en tiempo real
      });
    }

    function mostrarPanelPrincipal() {
      window.location.href = 'html/panel_admin.html';
    }

    // ========== LOGIN DEL REPRESENTANTE ==========
    document.getElementById("btnRep").addEventListener("click", loginRepresentante);
    // Valida las credenciales del representante contra la lista de Firebase
    function loginRepresentante() {
      const usuario = document.getElementById('login-rep-usuario').value.trim();
      const password = document.getElementById('login-rep-password').value.trim();

      // Validaciones
      if (!usuario || !password) {
        mostrarToastLogin('Por favor completa todos los campos', 'error');
        return;
      }

      if (usuario.length < 3) {
        mostrarToastLogin('El usuario debe tener al menos 3 caracteres', 'error');
        return;
      }

      const db = window.firebase.database;
      const refRep = window.firebase.ref(db, 'representantes');

      onValue(refRep, (snapshot) => {
        let encontrado = false;

        snapshot.forEach((childSnapshot) => {
          const rep = childSnapshot.val();

          // ⚠️ aquí puedes usar user o usuario según tu estructura
          console.log(rep.user)
          console.log(rep.contrasena)

          if (rep.user == usuario && rep.contrasena == password) {
            encontrado = true;

            const datosUsuario = {
              usuario: {
                id: childSnapshot.key,
                nombre: rep.nombre,
                user: rep.user,
                iniciales: rep.nombre.substring(0, 2).toUpperCase()
              },
              rol: 'representante'
            };

            localStorage.setItem('usuarioAutenticado', JSON.stringify(datosUsuario));

            mostrarToastLogin(`¡Bienvenido, ${rep.nombre}!`, 'success');

            setTimeout(() => {
              window.location.href = 'html/panel_usuario.html';
            }, 200);
          }
        });

        if (!encontrado) {
          mostrarToastLogin('Credenciales inválidas', 'error');
        }

      }, { onlyOnce: true });
    };


    // ========== TOAST PARA PANTALLA DE LOGIN ==========
    // Notificaciones especiales para la pantalla de login
    function mostrarToastLogin(mensaje, tipo = 'info') {
      const loginScreen = document.getElementById('login-screen');
      const colores = { success: 'bg-emerald-500', error: 'bg-red-500', info: 'bg-blue-500' };
      const iconos = { success: '✓', error: '✕', info: 'ℹ' };

      const toast = document.createElement('div');
      toast.className = `fixed bottom-4 right-4 flex items-center gap-3 px-4 py-3 ${colores[tipo]} text-white rounded-xl shadow-lg animate-slide-in z-50`;
      toast.innerHTML = `
        <span class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center text-sm font-bold">${iconos[tipo]}</span>
        <span class="font-medium">${mensaje}</span>
      `;

      loginScreen.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideIn 0.3s ease-out reverse';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    

    

    // ========== CERRAR MODALES AL PRESIONAR ESC ==========
    // Permite cerrar cualquier modal presionando la tecla ESC
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('account-modal').classList.add('hidden');
        document.getElementById('logout-modal').classList.add('hidden');
        document.getElementById('create-representative-modal').classList.add('hidden');
        document.getElementById('response-modal').classList.add('hidden');
        document.getElementById('edit-representative-modal').classList.add('hidden');
      }
    });

    
  </script>
